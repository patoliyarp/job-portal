<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Find your dream job today! Explore thousands of job openings in IT, Marketing, Finance & more. Top employers are hiring—apply now with [JobPortalName]."
    />

    <!-- Canonical Tag (Prevents Duplicate Content) -->
    <link rel="canonical" href="https://yourjobportal.com" />

    <!-- Robots Tag -->
    <!-- <meta name="robots" content="index, follow" /> -->

    <!-- Open Graph Tags (For Facebook/LinkedIn Sharing) -->
    <meta
      property="og:title"
      content="Find Your Dream Job | [JobPortalName] Career Portal"
    />
    <meta
      property="og:description"
      content="Thousands of new jobs posted daily. Connect with top employers in your industry."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourjobportal.com" />
    <meta
      property="og:image"
      content="https://yourjobportal.comimages/share-logo.png"
    />

    <!-- Twitter Cards (For Twitter Sharing) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Top Jobs & Career Opportunities in 2026 | [JobPortalName]"
    />
    <meta
      name="twitter:description"
      content="Find your dream job today! Explore thousands of job openings."
    />
    <meta
      name="twitter:image"
      content="https://yourjobportal.comimages/share-logo.png"
    />

    <!-- Application Name (Optional) -->
    <meta name="application-name" content="[JobPortalName]" />
    <title>job-app</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
